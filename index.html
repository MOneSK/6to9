<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân Nhóm Lớp 11.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap');
  :root {
    --bg:#0d1117;--surface:#161b22;--card:#1c2333;
    --accent:#58a6ff;--accent3:#3fb950;
    --text:#e6edf3;--muted:#8b949e;--border:#30363d;
    --female:#d2a8ff;--male:#79c0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh;padding:24px 16px}
  h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2rem);text-align:center;color:var(--accent);margin-bottom:4px}
  .subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:24px}
  .btn{display:block;margin:0 auto 28px;padding:14px 36px;background:linear-gradient(135deg,#1f6feb,#58a6ff);color:#fff;border:none;border-radius:12px;font-family:'Be Vietnam Pro',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(88,166,255,.3)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(88,166,255,.5)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:24px;display:none}
  .progress-label{font-size:.85rem;color:var(--muted);margin-bottom:8px}
  .progress-bar-bg{background:var(--border);border-radius:999px;height:8px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#1f6feb,#58a6ff);border-radius:999px;transition:width .05s;width:0%}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:24px;font-size:.85rem;color:var(--muted);display:none;line-height:1.8}
  .info-box strong{color:var(--accent3)}
  .info-box .hl{color:var(--accent);font-weight:700}
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .group-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeUp .4s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .group-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .group-title{font-weight:800;font-size:1rem}
  .group-badge{font-size:.72rem;padding:3px 10px;border-radius:999px;font-weight:600;background:rgba(88,166,255,.15);color:var(--accent)}
  .group-body{padding:8px 0}
  .student-row{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:.85rem;transition:background .1s}
  .student-row:hover{background:rgba(255,255,255,.04)}
  .sbd{font-size:.72rem;color:var(--muted);width:44px;flex-shrink:0}
  .name{flex:1}
  .gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-f{background:var(--female)}.dot-m{background:var(--male)}
  .gender-label{font-size:.7rem;font-weight:600;width:22px;flex-shrink:0}
  .lbl-f{color:var(--female)}.lbl-m{color:var(--male)}
  .legend{display:flex;gap:18px;justify-content:center;margin-bottom:20px;font-size:.8rem;color:var(--muted)}
  .legend-item{display:flex;align-items:center;gap:6px}
  .legend-dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<h1>🎲 Phân Nhóm Ngẫu Nhiên</h1>
<p class="subtitle">Lớp 11.1 — 7 nhóm × (2 Nam + 4 Nữ)<br>Random cho đến khi tìm được kết quả xuất hiện ít nhất 2 lần</p>

<button class="btn" id="startBtn" onclick="runAll()">▶ Bắt đầu Random</button>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label" id="progressLabel">Đang xử lý...</div>
  <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="info-box" id="infoBox"></div>

<div class="legend" id="legend" style="display:none">
  <div class="legend-item"><div class="legend-dot" style="background:var(--female)"></div>Nữ</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--male)"></div>Nam</div>
</div>

<div class="groups-grid" id="output"></div>

<script>
const students=[
  {sbd:"110001",ho:"Ngô Khánh",ten:"An",gt:"Nữ"},
  {sbd:"110002",ho:"Ngô Lê Phú",ten:"An",gt:"Nữ"},
  {sbd:"110003",ho:"Nguyễn Thúy",ten:"An",gt:"Nữ"},
  {sbd:"110004",ho:"Trần Sơn",ten:"Anh",gt:"Nam"},
  {sbd:"110005",ho:"Khuất Ngọc",ten:"Ánh",gt:"Nữ"},
  {sbd:"110006",ho:"Nguyễn Hà Thy",ten:"Bảo",gt:"Nữ"},
  {sbd:"110007",ho:"Nguyễn Ngọc Bảo",ten:"Bảo",gt:"Nữ"},
  {sbd:"110008",ho:"Phạm Đặng Thanh",ten:"Bình",gt:"Nam"},
  {sbd:"110009",ho:"Nguyễn Thành",ten:"Danh",gt:"Nam"},
  {sbd:"110010",ho:"Đoàn Minh",ten:"Đạt",gt:"Nam"},
  {sbd:"110011",ho:"Nguyễn Tấn",ten:"Đạt",gt:"Nam"},
  {sbd:"110012",ho:"Trần Gia",ten:"Hân",gt:"Nữ"},
  {sbd:"110013",ho:"Võ Lê Hoàng",ten:"Hiếu",gt:"Nam"},
  {sbd:"110014",ho:"Nguyễn Diệp Minh",ten:"Huyền",gt:"Nữ"},
  {sbd:"110015",ho:"Tô Phạm Duy",ten:"Hưng",gt:"Nam"},
  {sbd:"110016",ho:"Trần Anh",ten:"Khoa",gt:"Nam"},
  {sbd:"110017",ho:"Lý Gia",ten:"Kiệt",gt:"Nam"},
  {sbd:"110018",ho:"Nguyễn Hoàng",ten:"Kim",gt:"Nữ"},
  {sbd:"110019",ho:"Vũ Thiện",ten:"Lâm",gt:"Nam"},
  {sbd:"110020",ho:"Dương Nguyễn Dì",ten:"Linh",gt:"Nữ"},
  {sbd:"110021",ho:"Mai Trần Gia",ten:"Linh",gt:"Nữ"},
  {sbd:"110022",ho:"Bùi Mẫn",ten:"Nghi",gt:"Nữ"},
  {sbd:"110023",ho:"Nguyễn Kim Hồng",ten:"Ngọc",gt:"Nữ"},
  {sbd:"110024",ho:"Trương Bảo",ten:"Ngọc",gt:"Nữ"},
  {sbd:"110025",ho:"Vũ Ngọc Phương",ten:"Nhi",gt:"Nữ"},
  {sbd:"110026",ho:"Lê Thị Thùy",ten:"Như",gt:"Nữ"},
  {sbd:"110027",ho:"Vương Nguyễn Minh",ten:"Như",gt:"Nữ"},
  {sbd:"110028",ho:"Lương Thành",ten:"Phát",gt:"Nam"},
  {sbd:"110029",ho:"Bùi Thị Mỹ",ten:"Tâm",gt:"Nữ"},
  {sbd:"110030",ho:"Lương Đặng Mỹ",ten:"Tâm",gt:"Nữ"},
  {sbd:"110031",ho:"Nguyễn Ngọc",ten:"Thảo",gt:"Nữ"},
  {sbd:"110032",ho:"Phạm Thị Hương",ten:"Thảo",gt:"Nữ"},
  {sbd:"110033",ho:"Bùi Trọng",ten:"Thuần",gt:"Nam"},
  {sbd:"110034",ho:"Nguyễn Thị Bảo",ten:"Trâm",gt:"Nữ"},
  {sbd:"110035",ho:"Vũ Thanh",ten:"Tùng",gt:"Nam"},
  {sbd:"110036",ho:"Phạm Trần Kim",ten:"Tuyến",gt:"Nữ"},
  {sbd:"110037",ho:"Vũ Tường",ten:"Vi",gt:"Nữ"},
  {sbd:"110038",ho:"Trương Ngọc",ten:"Vương",gt:"Nam"},
  {sbd:"110039",ho:"Bùi Tường",ten:"Vy",gt:"Nữ"},
  {sbd:"110040",ho:"Phan Thị Tường",ten:"Vy",gt:"Nữ"},
  {sbd:"110041",ho:"Trần Ngọc Như",ten:"Ý",gt:"Nữ"},
  {sbd:"110042",ho:"Võ Phi",ten:"Yến",gt:"Nữ"},
];

const males=students.filter(s=>s.gt==="Nam");
const females=students.filter(s=>s.gt==="Nữ");

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function makeGroups(){
  const sm=shuffle(males),sf=shuffle(females),g=[];
  for(let i=0;i<7;i++) g.push([sm[i*2],sm[i*2+1],sf[i*4],sf[i*4+1],sf[i*4+2],sf[i*4+3]]);
  return g;
}

function groupKey(groups){
  return groups.map(g=>g.map(s=>s.sbd).sort().join(",")).sort().join("|");
}

async function runAll(){
  const btn=document.getElementById("startBtn");
  btn.disabled=true;
  const pw=document.getElementById("progressWrap"),pb=document.getElementById("progressBar"),pl=document.getElementById("progressLabel");
  pw.style.display="block";
  document.getElementById("infoBox").style.display="none";
  document.getElementById("output").innerHTML="";
  document.getElementById("legend").style.display="none";

  const freq={},results={};
  let found=false,foundAt=0,bestKey=null,total=0;
  const MAX=500000;

  for(let i=0;i<MAX&&!found;i++){
    const g=makeGroups();
    const k=groupKey(g);
    freq[k]=(freq[k]||0)+1;
    results[k]=g;
    total++;
    if(freq[k]>=2){found=true;foundAt=i+1;bestKey=k;}

    if(i%200===0){
      // animate bar spinning between 0-95 while searching
      const spin=((i/200)%19)/19*95;
      pb.style.width=spin+"%";
      pl.innerHTML=`🔍 Lần thứ <strong>${(i+1).toLocaleString()}</strong> — đang tìm kết quả lặp lại...`;
      await new Promise(r=>setTimeout(r,0));
    }
  }

  pb.style.width="100%";

  if(!bestKey){
    let best=0;
    for(const[k,c] of Object.entries(freq)){if(c>best){best=c;bestKey=k;}}
  }

  const uniqueCount=Object.keys(freq).length;
  const infoBox=document.getElementById("infoBox");
  infoBox.style.display="block";
  if(found){
    infoBox.innerHTML=`✅ Tìm thấy sau <span class="hl">${foundAt.toLocaleString()} lần</span> random!<br>
    Kết quả này xuất hiện <strong>${freq[bestKey]} lần</strong> — được chọn làm kết quả cuối cùng. 🎯<br>
    <span style="font-size:.8rem">Tổng số phương án khác nhau trong ${total.toLocaleString()} lần: <strong>${uniqueCount.toLocaleString()}</strong></span>`;
  } else {
    infoBox.innerHTML=`⚠️ Sau <strong>${total.toLocaleString()} lần</strong> vẫn chưa có kết quả lặp lại. Hiển thị kết quả phổ biến nhất.`;
  }

  pw.style.display="none";
  document.getElementById("legend").style.display="flex";
  renderGroups(results[bestKey]);
  btn.disabled=false;
  btn.textContent="🔄 Random lại";
}

function renderGroups(groups){
  const out=document.getElementById("output");
  out.innerHTML="";
  const colors=["#58a6ff","#3fb950","#f78166","#d2a8ff","#ffa657","#79c0ff","#56d364"];
  groups.forEach((members,idx)=>{
    const card=document.createElement("div");
    card.className="group-card";
    card.style.cssText=`animation-delay:${idx*.07}s;border-top:3px solid ${colors[idx]}`;
    const nam=members.filter(s=>s.gt==="Nam").length;
    const nu=members.filter(s=>s.gt==="Nữ").length;
    card.innerHTML=`
      <div class="group-header">
        <span class="group-title" style="color:${colors[idx]}">Nhóm ${idx+1}</span>
        <span class="group-badge">${nam} Nam · ${nu} Nữ</span>
      </div>
      <div class="group-body">
        ${members.map(s=>`
          <div class="student-row">
            <span class="sbd">${s.sbd}</span>
            <span class="name">${s.ho} <strong>${s.ten}</strong></span>
            <div class="gender-dot ${s.gt==='Nữ'?'dot-f':'dot-m'}"></div>
            <span class="gender-label ${s.gt==='Nữ'?'lbl-f':'lbl-m'}">${s.gt==='Nữ'?'Nữ':'Nam'}</span>
          </div>`).join("")}
      </div>`;
    out.appendChild(card);
  });
}
</script>
</body>
</html>
